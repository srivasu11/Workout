<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Longevity">
<link rel="manifest" href="manifest.json">
<title>Longevity Program</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#111}
body{display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#F0EDE6}

.topbar{flex-shrink:0;background:#111;padding:calc(env(safe-area-inset-top,20px) + 12px) 20px 14px;border-bottom:0.5px solid rgba(255,255,255,0.09)}
.topbar h1{font-size:20px;font-weight:600;letter-spacing:-0.4px}
.topbar small{font-size:12px;color:#666;display:block;margin-top:2px}

.day-strip{flex-shrink:0;display:flex;gap:7px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:#111;border-bottom:0.5px solid rgba(255,255,255,0.07)}
.day-strip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;padding:5px 14px;border-radius:18px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#666;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.dp.today{border-color:rgba(255,255,255,0.25);color:#aaa}
.dp.active{background:#F0EDE6;color:#111;border-color:#F0EDE6}

.scroll{flex:1;overflow-y:auto;padding:18px 16px calc(env(safe-area-inset-bottom,16px) + 24px)}

.day-hdr{margin-bottom:18px}
.day-hdr h2{font-size:19px;font-weight:600;letter-spacing:-0.3px}
.day-hdr p{font-size:13px;color:#666;margin-top:3px}
.prog-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:#3EBF8A;transition:width 0.35s ease}
.prog-lbl{font-size:11px;color:#555;margin-top:5px}

.slot{background:#1C1C1C;border-radius:13px;margin-bottom:11px;overflow:hidden;border:0.5px solid rgba(255,255,255,0.07)}
.slot-hdr{padding:9px 14px;display:flex;align-items:center;gap:7px}
.slot-lbl{font-size:11px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase}
.slot-tm{font-size:11px;opacity:0.65}

.sA .slot-hdr{background:rgba(29,158,117,0.13)}
.sA .slot-lbl,.sA .slot-tm{color:#3EBF8A}
.sB .slot-hdr{background:rgba(186,117,23,0.13)}
.sB .slot-lbl,.sB .slot-tm{color:#D4971E}
.sC .slot-hdr{background:rgba(55,138,221,0.13)}
.sC .slot-lbl,.sC .slot-tm{color:#5B9FE0}

.ex{padding:12px 14px;border-top:0.5px solid rgba(255,255,255,0.06);display:flex;align-items:flex-start;gap:11px;cursor:pointer;-webkit-user-select:none;user-select:none}
.ex:active{background:rgba(255,255,255,0.04)}

.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.18);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.ex.done .chk{background:#1E4A35;border-color:#3EBF8A}
.tick{display:none}
.ex.done .tick{display:block}

.ex-body{flex:1;min-width:0}
.ex-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ex-name{font-size:14px;font-weight:500;color:#F0EDE6;transition:color 0.15s}
.etag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.07);color:#777}
.ex-note{font-size:11px;color:#585858;margin-top:4px;line-height:1.5;transition:color 0.15s}
.ex-reps{font-size:12px;color:#666;white-space:nowrap;flex-shrink:0;padding-top:2px}

.ex.done .ex-name{text-decoration:line-through;color:#3A3A3A}
.ex.done .ex-note,.ex.done .ex-reps,.ex.done .etag{color:#2E2E2E;opacity:0.4}

.coverage-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.ctag{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(62,191,138,0.1);color:#3EBF8A;font-weight:500;letter-spacing:0.2px}

.info-note{font-size:11px;color:#5B9FE0;background:rgba(55,138,221,0.08);border-radius:8px;padding:8px 12px;margin-bottom:11px;line-height:1.5}

.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,16px) + 20px);left:50%;transform:translateX(-50%);background:#1E4A35;color:#3EBF8A;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <h1>Longevity Program</h1>
  <small id="dt"></small>
</div>
<div class="day-strip" id="strip"></div>
<div class="scroll" id="scroll"></div>
<div class="toast" id="toast"></div>

<script>
const SVG_CHECK = '<svg class="tick" width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5l3.5 3.5 6.5-7" stroke="#3EBF8A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

const D=[

/* ═══════════════════════════════════════════════════════════
   MONDAY — Lower Body · Anterior Chain
   Ground-up coverage: Tibialis/shin · FHL calf · VMO/lower quad · Ankle CARs · Hip flexor stretch · Neck flexion
   ═══════════════════════════════════════════════════════════ */
{n:'Mon',f:'Monday',focus:'Lower Body — Anterior Chain',
 coverage:['Tibialis','Shin','FHL Calf','Ankle CARs','VMO / Lower Quad','Hip Flexor (stretch)','Neck Flexion'],
 slots:[
  {l:'A',t:'AM · Mobility & Tendon Prep · 25 min',s:[
    {name:'Fan Bike warm-up',r:'5 min',e:'Fan Bike',
     note:'Easy, steady pace. Gets synovial fluid into the joints before loading.'},
    {name:'Tibialis Raise',r:'3 × 20',e:'Tib Bar',
     note:'Superset with FHL Calf Raise. Dorsiflexion under load — the shin muscle almost no one trains. Slow controlled lift.'},
    {name:'FHL Calf Raise',r:'3 × 20',e:'Sanddune / Step',
     note:'Superset with Tibialis. Full ROM — heel below platform on the way down. FHL is the deep calf tendon that wraps around the ankle.'},
    {name:'Ankle CARs',r:'2 × 10 each direction',e:'Floor / Wall',
     note:'Controlled Articular Rotations. Stand on one foot, draw the largest circle possible with the lifted foot — slow and deliberate. Builds joint health from the inside out. The first thing to atrophy when ankle mobility is neglected.'},
    {name:'KOT Step-Downs',r:'3 × 10–15 each',e:'Box / Floor',
     note:'Start flat or on a 2-inch block. Slow descent — the shin must track directly over the toes at all times. This is the foundational VMO and patellar tendon exercise in ATG.'},
    {name:'Couch Stretch',r:'2 min each side',e:'Floor',
     note:'Squeeze the glute of the back leg hard — this actively opens the hip flexor rather than passively dumping into the lumbar spine.'},
    {name:'ATG Neck Flexion',r:'3 × 20',e:'Light Plate',
     note:'Lying down, light plate on a folded towel on your forehead. Slow nod — chin to chest. Builds the deep cervical flexors that support the neck under load.'},
  ]},
  {l:'B',t:'PM · Flywheel Strength · 20 min',s:[
    {name:'Exer-Genie Backward Walk',r:'100 yards',e:'Exer-Genie',
     note:'Resisted backward walking pumps blood directly into the knee joint. Upright torso, drive through the heels, keep knees tracking forward.'},
    {name:'kBox ATG Split Squats',r:'3 × 5–8 each',e:'kBox',
     note:'Use the kBox belt. Hold TRX strap or PVC pipe for balance. This is the flagship ATG lower-body movement — full knee-over-toe depth loads the VMO, patellar tendon, and quad in a lengthened position.'},
    {name:'TRX Lower Back Traction',r:'2 min',e:'TRX',
     note:'After spinal loading, hang and breathe. Let the lumbar fully decompress before you sit or drive.'},
  ]},
]},

/* ═══════════════════════════════════════════════════════════
   TUESDAY — Upper Body · Posture & Pull
   Ground-up coverage: Shoulder ER · Lower traps · Serratus · Neck flexion · Hip flexor stretch
   ═══════════════════════════════════════════════════════════ */
{n:'Tue',f:'Tuesday',focus:'Upper Body — Posture & Pull',
 coverage:['Shoulder ER','Lower Traps','Serratus Anterior','Neck Flexion','Hip Flexor (stretch)'],
 slots:[
  {l:'A',t:'AM · Cardio, Shoulder Mobility & Neck · 25 min',s:[
    {name:'Fan Bike',r:'10 min',e:'Fan Bike',
     note:'Aerobic flush — steady 60–70% max heart rate. Conversational but not comfortable.'},
    {name:'TRX T-Spine Rotational Stretch',r:'2 × 10',e:'TRX',
     note:'Reach and rotate through the upper back. Control the end range — do not swing.'},
    {name:'TRX Y-Fly',r:'2 × 10',e:'TRX',
     note:'Arms in a Y overhead. Pull the shoulder blades together and DOWN — lower trap activation with a big eccentric load on the return.'},
    {name:'Serratus Punch',r:'3 × 12',e:'kPulley',
     note:'Face the kPulley. Single arm, elbow locked, punch forward past neutral — the final inch of the punch is pure serratus. This muscle protracts the scapula and is the #1 impingement preventer. Almost always undertrained.'},
    {name:'Neck Flexion',r:'3 × 20',e:'Light Plate',
     note:'Lying on a bench, light plate on a towel over your forehead. Slow nod — chin to chest.'},
    {name:'Couch Stretch',r:'2 min each side',e:'Floor',note:'Hip flexor reset mid-week.'},
  ]},
  {l:'B',t:'PM · Flywheel Pull, Traps & Core · 25 min',s:[
    {name:'kPulley Neutral Grip Rows',r:'4 × 8',e:'kPulley',
     note:'Superset with Chest Press. Full scapular retraction, 1-sec hold at peak. Use the flywheel\'s eccentric loading on the return.'},
    {name:'kPulley Chest Press',r:'4 × 8',e:'kPulley',
     note:'Superset with Rows. Staggered stance, face away from kPulley. The eccentric flywheel return builds more tissue than the press itself.'},
    {name:'kPulley Trap 3 Y-Raise',r:'3 × 10',e:'kPulley',
     note:'Stand facing the kPulley, hinge forward ~45°. Cable in hand, thumb pointing up. Raise the arm in a Y-pattern (arm at 45° from body, not straight out). The lower trapezius is the anchor muscle of the scapula — chronic weakness here leads to most shoulder injuries. Go light — most people can barely feel this muscle.'},
    {name:'kPulley Pullover',r:'3 × 10',e:'kPulley',
     note:'Stand facing the kPulley, arms overhead gripping the cable. Pull in a wide arc down to your hips — straight arms throughout. Hits lats, lower traps, and serratus all in one movement. This is the ground-up "back armor" exercise.'},
    {name:'kPulley Woodchoppers',r:'3 × 10 each',e:'kPulley',
     note:'Rotational core. Pivot the back foot, drive through the hips — the arms follow the hips, not the other way.'},
  ]},
]},

/* ═══════════════════════════════════════════════════════════
   WEDNESDAY — Mid-Week Active Recovery
   Ground-up coverage: Soleus (2nd day) · Hip flexor strength · Chirp Wheel spinal mobilization
   ═══════════════════════════════════════════════════════════ */
{n:'Wed',f:'Wednesday',focus:'Mid-Week Active Recovery — No Flywheel',
 coverage:['Soleus (2nd day)','Hip Flexor Strength','Spinal Mobilization'],
 slots:[
  {l:'A',t:'AM · Cardio & TRX Flow · 25 min',s:[
    {name:'Fan Bike',r:'10 min',e:'Fan Bike',
     note:'Very light — active recovery pace. Easy enough to hold a full conversation.'},
    {name:'TRX Lower Back Traction',r:'2 min',e:'TRX',
     note:'Hang and breathe. Full lumbar decompression.'},
    {name:'TRX Figure-Four Glute Stretch',r:'1 min each leg',e:'TRX',
     note:'Directly targets the hip capsule and piriformis. Sit into the stretch — do not force it.'},
    {name:'TRX Forward Lunge with T-Fly',r:'10 reps each leg',e:'TRX',
     note:'Step into the lunge, open arms into a T as you descend. Chest, hip flexor, and thoracic rotation in one move.'},
    {name:'Seated Soleus Calf Raise',r:'2 × 20',e:'kBox Belt',
     note:'Second soleus session of the week — this is the deep calf muscle that directly protects the Achilles tendon. Low load, high frequency is the key for tendon adaptation. Knee at 90° to fully bypass the gastrocnemius.'},
  ]},
  {l:'B',t:'PM · Chirp Wheel, Flexibility & Hip Strength · 25 min',s:[
    {name:'Chirp Wheel — Thoracic Rolling',r:'5 min',e:'Chirp Wheel',
     note:'Start with the medium or large wheel under your mid-back. Arms crossed on chest. Slowly roll from T4 to T12, pausing on tight spots. Let each segment extend over the wheel for 3–5 breaths. This restores the thoracic extension that sitting destroys — and unlocks overhead range you cannot get from stretching alone.'},
    {name:'Chirp Wheel — Lumbar & Hip',r:'3 min',e:'Chirp Wheel',
     note:'Move the wheel to your lower back and upper glutes. This is decompression, not mobilization — just let the wheel support the curve and breathe out.'},
    {name:'Seated Hip Flexor Raise',r:'3 × 15',e:'Bodyweight / Ankle Weight',
     note:'Sit at the edge of a bench, knee above hip height. Lift the knee higher — hold 1 sec at the top. The hip flexor needs to be STRONG, not just flexible. If you only stretch it, it will chronically tighten as a protective mechanism. Strengthening it is the fix. This is the most underdone movement in most programs.'},
    {name:'Couch Stretch',r:'3 min each side',e:'Floor',
     note:'Extended hold today — longer than weekday sessions. Real tissue change happens at 2+ minutes.'},
    {name:'Elephant Walks',r:'30 reps',e:'Floor',
     note:'Feet wide, hinge at hips, walk hands out slowly one at a time. Flushes the hamstrings and lower back.'},
    {name:'Hip 90/90 Stretch',r:'1 min each side',e:'Floor',
     note:'Work both internal and external hip rotation. Sit tall, breathe into the restricted side.'},
  ]},
]},

/* ═══════════════════════════════════════════════════════════
   THURSDAY — Lower Body · Posterior Chain & Lateral Balance
   Ground-up coverage: Soleus · Ankle dorsiflexion · Balance/vestibular · Neck extension + lateral · Shoulder IR · kPulley Pullover
   ═══════════════════════════════════════════════════════════ */
{n:'Thu',f:'Thursday',focus:'Lower Body — Posterior Chain & Neck',
 coverage:['Soleus','Ankle Dorsiflexion','Balance / Vestibular','Neck Extension','Neck Lateral Flexion','Shoulder IR'],
 slots:[
  {l:'A',t:'AM · Ankle, Soleus & Neck · 25 min',s:[
    {name:'Fan Bike warm-up',r:'5 min',e:'Fan Bike',note:'Easy warm-up spin.'},
    {name:'Wall Ankle Dorsiflexion Stretch',r:'2 × 45 sec each',e:'Wall',
     note:'Foot close to the wall, push knee forward over the toes until you feel the stretch deep in the ankle. This ROM directly limits your ATG squat depth — if the ankle won\'t dorsiflex, the heel will lift. Progress by moving the foot further from the wall each week.'},
    {name:'Seated Soleus Calf Raise',r:'3 × 20',e:'kBox Belt',
     note:'Knee bent at 90° — bypasses the gastrocnemius entirely and loads the soleus. The soleus is the primary Achilles tendon driver. High-rep, loaded work is the gold standard for tendinopathy prevention.'},
    {name:'Single-Leg Balance Stand',r:'60 sec each leg',e:'Floor',
     note:'Eyes open. Progress toward eyes closed, then slow head turns. Tracks your ankle and vestibular stability over time.'},
    {name:'Neck Extension',r:'3 × 15',e:'Light Plate / Towel',
     note:'Lie face-down on a bench, head off the edge. Light resistance on the back of the skull. Slow controlled extension — look up toward the ceiling. Pairs with neck flexion to build 360° cervical strength. Neglecting extension creates muscular imbalance that contributes to headaches and posture problems.'},
    {name:'Neck Lateral Flexion',r:'2 × 10 each side',e:'Bodyweight',
     note:'Slow and controlled — ear toward shoulder. No rotation. This is the third plane of neck movement. All three (flexion, extension, lateral) must be trained to build complete cervical resilience.'},
    {name:'Couch Stretch',r:'2 min each side',e:'Floor',note:'Squeeze rear glute actively.'},
  ]},
  {l:'B',t:'PM · Flywheel Posterior & Shoulder IR · 25 min',s:[
    {name:'Exer-Genie Forward Sled Pull',r:'100 yards',e:'Exer-Genie',
     note:'Truck-pull style. Forward lean, drive through the hips and hamstrings. Fires glutes and lower back safely.'},
    {name:'kBox Lateral Squats',r:'3 × 6 each leg',e:'kBox',
     note:'Step wide over the kBox, sink into one hip while keeping the opposite leg straight. Loads the adductors and clears lateral hip stiffness.'},
    {name:'kPulley Single-Leg Glute Kickback',r:'3 × 10 each',e:'kPulley',
     note:'Ankle strap facing the kPulley. Kick straight back and slightly outward. Squeeze the glute hard at full extension.'},
    {name:'kPulley Internal Rotation (IR)',r:'3 × 15 each',e:'kPulley',
     note:'Elbow at 90°, pinned to your side. Rotate the forearm inward toward your belly button against the cable resistance. This completes the ER/IR pair from Tuesday — shoulder health requires balanced strength in both directions. Most people do none.'},
  ]},
]},

/* ═══════════════════════════════════════════════════════════
   FRIDAY — Upper Body · Pressing & Structural Armor
   Ground-up coverage: Neck flexion · Chest/shoulder tissue · Lat / lower trap (pullover) · Grip
   ═══════════════════════════════════════════════════════════ */
{n:'Fri',f:'Friday',focus:'Upper Body — Pressing & Structural Armor',
 coverage:['Neck Flexion','Chest Tissue','Shoulder Press','Lats / Lower Trap','Grip'],
 slots:[
  {l:'A',t:'AM · Cardio Intervals, Chest Mobility & Neck · 25 min',s:[
    {name:'Fan Bike Intervals',r:'10 min',e:'Fan Bike',
     note:'20 sec all-out / 40 sec easy. Repeat. Or 4 × 4 min at 90% max HR with 3 min rest. Must be genuinely hard.'},
    {name:'TRX Forward Lunge with T-Fly',r:'3 × 8 each',e:'TRX',
     note:'Open the chest on every rep. Pause at the bottom of the lunge and breathe in.'},
    {name:'Neck Flexion',r:'3 × 20',e:'Light Plate',
     note:'End-of-week reinforcement of the cervical flexion pattern.'},
    {name:'Couch Stretch',r:'2 min each side',e:'Floor',
     note:'End-of-week hip flexor reset before the weekend extended sessions.'},
  ]},
  {l:'B',t:'PM · Flywheel Press, Pullover & Grip · 25 min',s:[
    {name:'kPulley Standing Overhead Press',r:'3 × 8',e:'kPulley',
     note:'Slight forward lean at full lockout. Control the eccentric on the way down — this is where the flywheel pays off.'},
    {name:'kPulley Standing Chest Flyes',r:'3 × 10',e:'kPulley',
     note:'Wide hugging motion. Build tissue across the chest and anterior shoulder. Slow and wide — not a pressing pattern.'},
    {name:'kPulley Pullover',r:'3 × 10',e:'kPulley',
     note:'Second pullover session of the week (Tuesday PM being the first). Stand facing kPulley, arms overhead, pull in a wide arc to your hips — straight arms. Reinforces the lat, lower trap, and serratus as a connected chain.'},
    {name:'kPulley Bicep Curl → Hammer Curl',r:'3 × 10',e:'kPulley',
     note:'Full supination on the bicep curl, then neutral grip for the hammer. One set covers both heads and the brachialis.'},
    {name:'TRX Lat Stretch',r:'1–2 min',e:'TRX',
     note:'Cooldown. Lean sideways into the straps to open the rib cage and decompress the lower back.'},
  ]},
]},

/* ═══════════════════════════════════════════════════════════
   SATURDAY — Extended Cardio & Full Mobility Reset
   Ground-up coverage: Zone 2 aerobic base · Full lower chain mobility · VMO optional
   ═══════════════════════════════════════════════════════════ */
{n:'Sat',f:'Saturday',focus:'Extended Cardio & Full Mobility Reset',
 coverage:['Zone 2 Aerobic','Hip Mobility','Ankle Mobility','VMO (optional)','Balance Benchmark'],
 slots:[
  {l:'A',t:'AM · Zone 2 Cardio · 35–45 min',s:[
    {name:'Sanddune Stepper Warm-Up',r:'5 min',e:'Sanddune',
     note:'Easy pace on the Sanddune to warm up the feet, ankles, and calves before the Zone 2 block.'},
    {name:'Sanddune Stepper — Zone 2',r:'25–30 min',e:'Sanddune',
     note:'Steady walking on the Sanddune stepper — 60–70% max heart rate. Vary your stride length and pace every few minutes. The unstable surface adds foot and ankle activation you do not get on flat ground. Substitute with a 35-min outdoor walk if preferred.'},
    {name:'Sanddune Stepper Walk',r:'10 min',e:'Sanddune',
     note:'Optional cooldown after the Zone 2 block. Easy pace — keeps blood moving and adds more foot and ankle activation.'},
  ]},
  {l:'B',t:'PM · Extended Mobility + Optional Flywheel · 35 min',s:[
    {name:'Couch Stretch',r:'3 min each side',e:'Floor',
     note:'Extended hold — use the extra weekend time for real tissue adaptation. Longer than any weekday session.'},
    {name:'Hip 90/90 Stretch',r:'2 min each side',e:'Floor',
     note:'Work actively into end range on both internal and external rotation. Sit tall, breathe out as you press deeper.'},
    {name:'Deep Squat Hold',r:'3 min',e:'Floor / TRX',
     note:'Progress toward removing heel elevation over weeks. This is a benchmark for full-chain lower-body mobility — ankles, knees, and hips all in one test.'},
    {name:'Thoracic Rotation',r:'1 × 15 each',e:'Floor',
     note:'Quadruped or seated. Reach through and open up — upper back rotation resets the posture pattern.'},
    {name:'Single-Leg Balance',r:'45 sec each',e:'Floor',
     note:'Weekly benchmark. Eyes open → eyes closed → slow head turns. Track your improvement week to week.'},
    {name:'kBox ATG Split Squats (optional)',r:'2 × 5 each',e:'kBox',
     note:'Only if energy is good. Light load, perfect form — reinforcement, not a workout.'},
  ]},
]},

/* ═══════════════════════════════════════════════════════════
   SUNDAY — Active Recovery · Walk & Chirp Wheel
   Ground-up coverage: Foot/ankle (walking) · Spinal mobilization · Optional light core
   ═══════════════════════════════════════════════════════════ */
{n:'Sun',f:'Sunday',focus:'Active Recovery — Walk, Chirp Wheel & Optional Core',
 coverage:['Foot & Ankle (walking)','Spinal Mobilization','Core (optional)'],
 slots:[
  {l:'A',t:'AM · Walking & Spinal Reset',s:[
    {name:'Outdoor Walk',r:'30–45 min',e:'Outside',
     note:'Easy pace — no target heart rate. Genuine recovery walking. Barefoot on grass if possible: foot intrinsic muscles, proprioception, and ground contact are all therapeutic.'},
    {name:'Sanddune Stepper Walk',r:'10 min',e:'Sanddune',
     note:'Can substitute or add to the outdoor walk. Gentle foot and ankle activation on an unstable surface.'},
    {name:'Chirp Wheel — Thoracic Rolling',r:'5 min',e:'Chirp Wheel',
     note:'Mid-back (T4–T12) rolling. Start with the medium wheel. Pause on tight spots for 3–5 breaths — this is the most important spinal self-care tool for anyone who sits or lifts. Opens thoracic extension and rib cage breathing.'},
    {name:'Chirp Wheel — Lumbar & Upper Back',r:'3 min',e:'Chirp Wheel',
     note:'Roll gently through the lower thoracic and upper lumbar. End on the large wheel for broad decompression. Think of it as manually restoring the spinal curves that a week of training compresses.'},
  ]},
  {l:'B',t:'PM · Optional Light Core (energy permitting)',s:[
    {name:'Glute Bridge',r:'2 × 15',e:'Floor',
     note:'Full hip extension, 1-sec hold at the top. Activates the glutes without spinal compression — ideal for a recovery day.'},
    {name:'TRX Back Extension',r:'2 × 12',e:'TRX',
     note:'Hinge at hips, extend to upright. Spinal erectors and glutes — low-load pattern reinforcement heading into the new week.'},
    {name:'kPulley Woodchoppers',r:'2 × 10 each',e:'kPulley',
     note:'Light load. Rotational pattern to keep the core motor neurons warm going into Monday.'},
    {name:'Dead Hang',r:'2 × 45 sec',e:'Pull-up Bar',
     note:'Final spinal decompression of the week. Relax completely — let everything lengthen. Grip strength adaptation is a bonus.'},
  ]},
]},

];

/* ─── LOGIC ─────────────────────────────────────────────────── */
function toIdx(js){return({1:0,2:1,3:2,4:3,5:4,6:5,0:6})[js]}
let active=toIdx(new Date().getDay());
const today=active;
const dateKey=new Date().toISOString().slice(0,10);

function ck(di,si,ei){try{return localStorage.getItem('lp_'+dateKey+'_'+di+'_'+si+'_'+ei)==='1'}catch(e){return false}}
function setck(di,si,ei,v){try{v?localStorage.setItem('lp_'+dateKey+'_'+di+'_'+si+'_'+ei,'1'):localStorage.removeItem('lp_'+dateKey+'_'+di+'_'+si+'_'+ei)}catch(e){}}
function totEx(d){return d.slots.reduce((a,s)=>a+s.s.length,0)}
function doneEx(di){let c=0;D[di].slots.forEach((sl,si)=>sl.s.forEach((_,ei)=>{if(ck(di,si,ei))c++}));return c}

function renderStrip(){
  const el=document.getElementById('strip');
  el.innerHTML=D.map((d,i)=>'<button class="dp'+(i===active?' active':'')+(i===today&&i!==active?' today':'')+'" onclick="go('+i+')">'+d.n+'</button>').join('');
  setTimeout(()=>{const a=el.querySelector('.dp.active');if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'})},50);
}

function renderDay(){
  const d=D[active];
  const el=document.getElementById('scroll');
  const tot=totEx(d),done=doneEx(active),pct=tot?Math.round(done/tot*100):0;

  let h='<div class="day-hdr"><h2>'+d.f+'</h2><p>'+d.focus+'</p>';
  h+='<div class="prog-bar"><div class="prog-fill" id="pf" style="width:'+pct+'%"></div></div>';
  h+='<p class="prog-lbl" id="pl">'+done+' of '+tot+' completed</p></div>';

  // ATG coverage tags
  if(d.coverage&&d.coverage.length){
    h+='<div class="coverage-bar">'+d.coverage.map(c=>'<span class="ctag">'+c+'</span>').join('')+'</div>';
  }

  // Sunday optional note
  if(active===6){
    h+='<div class="info-note">💤 PM slot is fully optional — the walk + Chirp Wheel is enough. Only add core if your energy is genuinely good.</div>';
  }

  d.slots.forEach((sl,si)=>{
    const label=sl.l==='A'?'AM':'PM';
    h+='<div class="slot s'+sl.l+'"><div class="slot-hdr"><span class="slot-lbl">'+label+'</span><span class="slot-tm">· '+sl.t+'</span></div>';
    sl.s.forEach((ex,ei)=>{
      const isDone=ck(active,si,ei);
      h+='<div class="ex'+(isDone?' done':'')+'" onclick="tog('+active+','+si+','+ei+',this)">';
      h+='<div class="chk">'+SVG_CHECK+'</div>';
      h+='<div class="ex-body"><div class="ex-top"><span class="ex-name">'+ex.name+'</span><span class="etag">'+ex.e+'</span></div>';
      if(ex.note)h+='<p class="ex-note">'+ex.note+'</p>';
      h+='</div><span class="ex-reps">'+ex.r+'</span></div>';
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

function tog(di,si,ei,row){
  const now=row.classList.contains('done');
  setck(di,si,ei,!now);
  row.classList.toggle('done',!now);
  const tot=totEx(D[di]),done=doneEx(di),pct=tot?Math.round(done/tot*100):0;
  const pf=document.getElementById('pf'),pl=document.getElementById('pl');
  if(pf)pf.style.width=pct+'%';
  if(pl)pl.textContent=done+' of '+tot+' completed';
  if(done===tot&&tot>0)showToast('Day complete 🎉');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function go(i){active=i;renderStrip();renderDay();document.getElementById('scroll').scrollTop=0}

document.getElementById('dt').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
renderStrip();renderDay();


</script>
</body>
</html>
